name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    name: Test, build, and scan
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@11.5.3 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prod=false

      - name: Run tests
        run: pnpm test

      - name: Build packages
        run: pnpm run build

      - name: Run AgentMergeGuard scan
        run: pnpm scan
